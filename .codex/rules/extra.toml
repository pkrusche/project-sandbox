[[prefix_rules]]
pattern = ["uv"]
decision = "allow"
justification = "Allow local uv package/tool execution in trusted workspaces."

[[prefix_rules]]
pattern = ["uv", "run"]
decision = "allow"
justification = "Allow uv run commands for local development workflows."

[[prefix_rules]]
pattern = ["uv", "run", "pytest"]
decision = "allow"
justification = "Allow running pytest test suites through uv."

[[prefix_rules]]
pattern = ["pytest"]
decision = "allow"
justification = "Allow direct local pytest execution."

[[prefix_rules]]
pattern = ["python", "-m", "pytest"]
decision = "allow"
justification = "Allow pytest invocation through python -m pytest."

[[prefix_rules]]
pattern = ["jj"]
decision = "allow"
justification = "Allow local jujutsu version-control commands."
